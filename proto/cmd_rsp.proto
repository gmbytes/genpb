syntax = "proto3";

package pb;

option go_package = "server/pb";

import    "data.proto";
import    "enum.proto";

message RspLogin {
  EErrorCode.T              err           = 1;
  bool                      fast          = 2; // 是否快速登陆
  sint64                    reboot_time   = 3; // 预计开服时间戳，为 0 代表未知
  sint64                    shutdown_time = 4; // 关服时间戳
  bool                      devmod        = 5; // 是否为开发模式
  repeated RoleSummaryData roles         = 6; // 角色数组
  string                    account       = 7; // 账号 id
  sint64                    server_time   = 8; // 服务器时间（毫秒）
}

message RspCreateRole {
  EErrorCode.T     err  = 1;
  RoleSummaryData role = 2; // 角色
}

// 角色进入游戏
message RspLoginRole {
  EErrorCode.T err  = 1;
  LoginData   data = 2; // 登录必要数据
}

// 心跳
message RspPing {

}

// 心跳(客户端切换后台发送该消息)
message RspPingZZZ {}

message RspEnterZone {}

message RspMove {
    int64  role_id = 1; // 角色id
    Vector pos     = 2; // 位置
}