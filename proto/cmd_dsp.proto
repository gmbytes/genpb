syntax = "proto3";

package pb;

option go_package = "server/pb";

import    "data.proto";
import    "enum.proto";


///////////////////////////////////////////////////////////////////////


message DspLogin {
  LoginData data = 1; // 登录必要数据
}

// 服务器维护
message DspSrvMaintain {
  sint64 reboot_time   = 1; // 预计开服时间戳，为 0 代表未知
  sint64 shutdown_time = 2; // 关服时间戳
}

// 踢玩家下线
message DspKickRole {
  EKickType.T ty      = 1; // 踢下线类型
  sint64      sess_id = 2; // sess id，服务器使用
}

// 更新邮件
message DspPreparedEnterZone {}

message DspMove {
  int64  role_id = 1; // 角色id
  Vector pos     = 2; // 位置
}